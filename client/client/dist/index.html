<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { padding: 40px; }
    h1 { font-size: 48px; margin-bottom: 16px; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #94a3b8; font-size: 18px; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
    }
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
      margin-top: 48px;
      max-width: 800px;
    }
    .feature {
      padding: 24px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .feature h3 { margin-bottom: 8px; color: #6366f1; }
    .feature p { font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>G-Chat</h1>
    <p>Secure Corporate Messenger with E2EE Encryption</p>
    <a href="/api/health" class="btn">Check API Status</a>
    <div class="features">
      <div class="feature"><h3>🔐 E2EE</h3><p>End-to-end encrypted</p></div>
      <div class="feature"><h3>📹 Video Calls</h3><p>WebRTC group calls</p></div>
      <div class="feature"><h3>🎙️ Voice</h3><p>Voice messages</p></div>
      <div class="feature"><h3>👤 Admin</h3><p>Full admin control</p></div>
    </div>
    <p style="margin-top: 48px; font-size: 14px;">API is running. Full interface coming soon.</p>
  </div>
</body>
</html>
