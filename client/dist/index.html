<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container { padding: 40px; max-width: 500px; width: 100%; }
    h1 { font-size: 48px; margin-bottom: 16px; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #94a3b8; font-size: 18px; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      margin: 8px;
      border: none;
      cursor: pointer;
      width: 100%;
    }
    .btn:hover { opacity: 0.9; }
    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 16px;
    }
    input::placeholder { color: #64748b; }
    .form-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 32px;
      margin-top: 24px;
    }
    .form-box h2 { color: #6366f1; margin-bottom: 20px; }
    .result {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .result.success { background: rgba(34,197,94,0.2); color: #4ade80; display: block; }
    .result.error { background: rgba(239,68,68,0.2); color: #f87171; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>G-Chat</h1>
    <p>Корпоративный мессенджер с E2EE шифрованием</p>
    
    <div class="form-box">
      <h2>📝 Регистрация</h2>
      <p style="font-size:14px; margin-bottom:16px;">Первый пользователь = Администратор автоматически!</p>
      <input type="text" id="username" placeholder="Логин (например: admin)">
      <input type="email" id="email" placeholder="Email (например: admin@mail.ru)">
      <input type="password" id="password" placeholder="Пароль (минимум 6 символов)">
      <button class="btn" onclick="register()">Зарегистрироваться</button>
      <div id="result" class="result"></div>
    </div>
  </div>

  <script>
    async function register() {
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const resultDiv = document.getElementById('result');
      
      if (!username || !email || !password) {
        resultDiv.className = 'result error';
        resultDiv.textContent = 'Заполните все поля!';
        return;
      }
      
      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          resultDiv.className = 'result success';
          resultDiv.innerHTML = '✅ Регистрация успешна!<br>Ты теперь АДМИНИСТРАТОР!<br>Токен: ' + data.token.substring(0, 20) + '...';
        } else {
          resultDiv.className = 'result error';
          resultDiv.textContent = '❌ Ошибка: ' + (data.error || 'Неизвестная ошибка');
        }
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = '❌ Ошибка соединения';
      }
    }
  </script>
</body>
</html>
