<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { padding: 40px; max-width: 900px; }
    h1 { font-size: 48px; margin-bottom: 16px; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #94a3b8; font-size: 18px; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      margin: 8px;
    }
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 24px;
      margin-top: 48px;
    }
    .feature {
      padding: 24px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .feature h3 { margin-bottom: 8px; color: #6366f1; }
    .feature p { font-size: 14px; margin: 0; color: #94a3b8; }
    .status { margin-top: 32px; padding: 16px; background: rgba(99,102,241,0.1); border-radius: 12px; border: 1px solid rgba(99,102,241,0.3); }
    .status code { color: #6366f1; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>G-Chat</h1>
    <p>Корпоративный мессенджер с E2EE шифрованием</p>
    <div>
      <a href="/api/health" class="btn">Проверить API</a>
      <a href="/api/admin/stats" class="btn">Статистика админа</a>
    </div>
    <div class="features">
      <div class="feature"><h3>🔐 E2EE</h3><p>Сквозное шифрование сообщений</p></div>
      <div class="feature"><h3>📹 Видеозвонки</
